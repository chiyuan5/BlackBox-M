name: Build Android APK (legacy deps fallback)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager             "platform-tools"             "platforms;android-32"             "build-tools;32.0.0"             "ndk;23.1.7779620"             "cmake;3.18.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare legacy AAR dependencies
        run: |
          mkdir -p app/libs

          curl -fL --retry 3 --retry-all-errors             -o app/libs/catloadinglibrary-1.0.9.aar             https://artifactory.appodeal.com/appodeal-public/com/roger/catloadinglibrary/catloadinglibrary/1.0.9/catloadinglibrary-1.0.9.aar

          curl -fL --retry 3 --retry-all-errors             -o app/libs/floatingview-1.6.aar             https://artifactory.appodeal.com/appodeal-public/com/imuxuan/floatingview/1.6/floatingview-1.6.aar

          curl -fL --retry 3 --retry-all-errors             -o app/libs/stateview-kotlin-2.2.0.aar             https://maven.scijava.org/content/repositories/public/com/github/nukc/stateview/kotlin/2.2.0/kotlin-2.2.0.aar

          ls -lah app/libs

      - name: Disable broken remote dependencies in app/build.gradle
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("app/build.gradle")
          s = p.read_text(encoding="utf-8")

          targets = [
              "implementation 'com.github.nukc.stateview:kotlin:2.2.0'",
              "implementation 'com.roger.catloadinglibrary:catloadinglibrary:1.0.9'",
              "implementation 'com.imuxuan:floatingview:1.6'",
          ]

          for t in targets:
              s = s.replace(t, "// " + t + "  // disabled in CI, resolved from app/libs")

          p.write_text(s, encoding="utf-8")
          print("Patched app/build.gradle")
          PY

          sed -n '1,220p' app/build.gradle

      - name: Build all debug APKs
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Collect APKs
        run: |
          mkdir -p release-apk
          find app/build/outputs/apk -type f -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-apk/$(basename "$file")"
          done
          ls -lah release-apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackBox-M-debug-apks
          path: release-apk/*.apk
          if-no-files-found: error
          retention-days: 14
