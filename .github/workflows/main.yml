name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;23.1.7779620" \
            "cmake;3.18.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all debug APKs
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Collect APKs
        run: |
          mkdir -p release-apk
          find app/build/outputs/apk -type f -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            variant_dir="$(basename "$(dirname "$file")")"
            cp "$file" "release-apk/${variant_dir}-$(basename "$file")"
          done
          ls -lah release-apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackBox-M-debug-apks
          path: release-apk/*.apk
          if-no-files-found: error
          retention-days: 14
