name: Build Android APK (legacy deps fallback)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Show Java version
        run: |
          java -version
          javac -version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-32" \
            "build-tools;32.0.0" \
            "ndk;23.1.7779620" \
            "cmake;3.18.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare legacy AAR dependencies
        run: |
          mkdir -p app/libs

          curl -fL --retry 3 --retry-all-errors \
            -o app/libs/catloadinglibrary-1.0.9.aar \
            https://artifactory.appodeal.com/appodeal-public/com/roger/catloadinglibrary/catloadinglibrary/1.0.9/catloadinglibrary-1.0.9.aar

          curl -fL --retry 3 --retry-all-errors \
            -o app/libs/floatingview-1.6.aar \
            https://artifactory.appodeal.com/appodeal-public/com/imuxuan/floatingview/1.6/floatingview-1.6.aar

          ls -lah app/libs

      - name: Patch app/build.gradle for CI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("app/build.gradle")
          s = p.read_text(encoding="utf-8")

          targets = [
              "implementation 'com.roger.catloadinglibrary:catloadinglibrary:1.0.9'",
              "implementation 'com.imuxuan:floatingview:1.6'",
          ]

          for t in targets:
              s = s.replace(t, "// " + t + "  // disabled in CI, resolved from app/libs")

          p.write_text(s, encoding="utf-8")
          print("Patched app/build.gradle")
          PY

          echo "----- app/build.gradle head -----"
          sed -n '1,30p' app/build.gradle

          echo "----- app/build.gradle (grep catloading/floatingview) -----"
          grep -nE "catloading|floatingview" app/build.gradle || true

      - name: Build all debug APKs
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --info --warning-mode all :app:assembleDebug 2>&1 | tee gradle-build.log

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Collect APKs
        if: success()
        run: |
          mkdir -p release-apk
          find app/build/outputs/apk -type f -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-apk/$(basename "$file")"
          done
          ls -lah release-apk

      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BlackBox-M-debug-apks
          path: release-apk/*.apk
          if-no-files-found: error
          retention-days: 14
