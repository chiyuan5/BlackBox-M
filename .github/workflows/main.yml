name: Build Android APK (replace dead StateView dep)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Show Java version
        run: |
          java -version
          javac -version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-30" \
            "platforms;android-32" \
            "build-tools;30.0.3" \
            "build-tools;32.0.0" \
            "ndk;23.1.7779620" \
            "cmake;3.18.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare legacy AAR dependencies
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p app/libs

          curl -fL --retry 3 --retry-all-errors \
            -o app/libs/catloadinglibrary-1.0.9.aar \
            https://artifactory.appodeal.com/appodeal-public/com/roger/catloadinglibrary/catloadinglibrary/1.0.9/catloadinglibrary-1.0.9.aar

          curl -fL --retry 3 --retry-all-errors \
            -o app/libs/floatingview-1.6.aar \
            https://artifactory.appodeal.com/appodeal-public/com/imuxuan/floatingview/1.6/floatingview-1.6.aar

          ls -lah app/libs

      - name: Patch Gradle files for CI
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import re

          root_file = Path("build.gradle")
          app_file = Path("app/build.gradle")

          root = root_file.read_text(encoding="utf-8")
          app = app_file.read_text(encoding="utf-8")

          jitpack_repo = "maven { url 'https://jitpack.io' }"

          # 1) root build.gradle：确保 buildscript / allprojects 能访问 jitpack
          if "https://jitpack.io" not in root:
              root = re.sub(
                  r"(jcenter\(\)\s*)",
                  r"\\1        " + jitpack_repo + "\n",
                  root,
                  count=1,
              )
              if "https://jitpack.io" not in root:
                  root = root.replace(
                      "mavenCentral()",
                      "mavenCentral()\n        " + jitpack_repo,
                      1
                  )

          root_file.write_text(root, encoding="utf-8")

          # 2) app/build.gradle：把 repositories { mavenCentral() } 补成带 google/jitpack
          repo_block = """repositories {
              google()
              mavenCentral()
              maven { url 'https://jitpack.io' }
          }"""

          if "https://jitpack.io" not in app:
              app, n = re.subn(
                  r"repositories\s*\{\s*mavenCentral\(\)\s*\}",
                  repo_block,
                  app,
                  count=1,
                  flags=re.S,
              )
              if n == 0:
                  app = app.replace("dependencies {", repo_block + "\n\ndependencies {", 1)

          # 3) stateview：旧坐标已失效，替换为作者 README 当前给的新坐标
          old_stateview = "implementation 'com.github.nukc.stateview:kotlin:2.2.0'"
          new_stateview = "implementation 'com.github.nukc:StateView:v3.0.6'"

          if old_stateview in app:
              app = app.replace(old_stateview, new_stateview)
          elif new_stateview not in app:
              app = app.replace("dependencies {", "dependencies {\n    " + new_stateview, 1)

          # 4) 两个老库继续走本地 AAR 兜底
          old_cat = "implementation 'com.roger.catloadinglibrary:catloadinglibrary:1.0.9'"
          old_float = "implementation 'com.imuxuan:floatingview:1.6'"

          if old_cat in app:
              app = app.replace(
                  old_cat,
                  "// implementation 'com.roger.catloadinglibrary:catloadinglibrary:1.0.9'  // disabled in CI, resolved from app/libs"
              )

          if old_float in app:
              app = app.replace(
                  old_float,
                  "// implementation 'com.imuxuan:floatingview:1.6'  // disabled in CI, resolved from app/libs"
              )

          app_file.write_text(app, encoding="utf-8")

          print("Patched build.gradle and app/build.gradle")
          PY

          echo "----- root build.gradle (repo grep) -----"
          grep -nE "google\\(|mavenCentral\\(|jcenter\\(|jitpack" build.gradle || true

          echo "----- app/build.gradle (repo/deps grep) -----"
          grep -nE "repositories|StateView|stateview|catloading|floatingview|jitpack" app/build.gradle || true

      - name: Build all debug APKs
        shell: bash
        run: |
          set -o pipefail
          ./gradlew \
            --no-daemon \
            --refresh-dependencies \
            --stacktrace \
            --info \
            --warning-mode all \
            :app:assembleDebug 2>&1 | tee gradle-build.log

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Collect APKs
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-apk
          find app/build/outputs/apk -type f -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-apk/$(basename "$file")"
          done
          ls -lah release-apk

      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BlackBox-M-debug-apks
          path: release-apk/*.apk
          if-no-files-found: error
          retention-days: 14
